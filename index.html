<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Directorio LAE</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            padding: 40px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 { color: #1e3c72; margin-bottom: 10px; }
        .subtitle { color: #666; margin-bottom: 30px; }
        .stats {
            background: #f0f4f8;
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            margin-bottom: 30px;
        }
        .stats h2 { font-size: 3rem; color: #1e3c72; }
        .actions {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        button {
            padding: 12px 24px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
        }
        .btn-add {
            background: #28a745;
            color: white;
        }
        .btn-search {
            background: #2a5298;
            color: white;
        }
        .btn-delete {
            background: #dc3545;
            color: white;
            padding: 6px 16px;
            font-size: 14px;
        }
        .filters {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .filter {
            background: #e9ecef;
            padding: 8px 20px;
            border-radius: 25px;
            cursor: pointer;
        }
        .filter.active {
            background: #2a5298;
            color: white;
        }
        .search-box {
            display: flex;
            gap: 10px;
            flex: 1;
        }
        .search-box input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 12px;
        }
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }
        .card {
            background: white;
            border: 1px solid #e9ecef;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            transition: transform 0.2s;
        }
        .card:hover { transform: translateY(-4px); box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        .card h3 { color: #1e3c72; margin-bottom: 8px; }
        .category {
            display: inline-block;
            background: #e0e7ff;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            margin-bottom: 15px;
        }
        .info { margin: 8px 0; color: #555; font-size: 14px; }
        .card-footer { margin-top: 15px; text-align: right; }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 500px;
        }
        .modal-content input, .modal-content select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 10px;
        }
        .modal-buttons { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
        .empty { text-align: center; padding: 50px; color: #999; }
    </style>
</head>
<body>
<div class="container">
    <h1>📋 Directorio de Servicios LAE</h1>
    <div class="subtitle">Valdivia · Los Ríos | Módulo de Consultas</div>

    <div class="stats">
        <h2 id="totalCount">0</h2>
        <p>Instituciones registradas</p>
    </div>

    <div class="actions">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Buscar por nombre...">
            <button class="btn-search" onclick="buscar()">Buscar</button>
        </div>
        <button class="btn-add" onclick="abrirModal()">➕ Agregar Servicio</button>
    </div>

    <div class="filters" id="filters">
        <div class="filter active" data-cat="Todas">Todas</div>
        <div class="filter" data-cat="Salud">Salud</div>
        <div class="filter" data-cat="Educación">Educación</div>
        <div class="filter" data-cat="Gobierno">Gobierno</div>
        <div class="filter" data-cat="Social">Social</div>
        <div class="filter" data-cat="Transporte">Transporte</div>
    </div>

    <div id="cardsContainer" class="cards-grid">
        <div class="empty">Cargando...</div>
    </div>
</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <h3>Agregar Institución</h3>
        <input type="text" id="nombre" placeholder="Nombre *">
        <select id="categoria">
            <option>Salud</option><option>Educación</option><option>Gobierno</option>
            <option>Social</option><option>Transporte</option>
        </select>
        <input type="text" id="direccion" placeholder="Dirección">
        <input type="text" id="telefono" placeholder="Teléfono">
        <div class="modal-buttons">
            <button onclick="cerrarModal()">Cancelar</button>
            <button class="btn-add" onclick="guardar()">Guardar</button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    // Supabase
    const supabaseUrl = 'https://qretisqnxujcdcbsfxno.supabase.co';
    const supabaseKey = 'sb_publishable_j_q9B80XokJo-eTgjqHC2Q_y_P01BMH';
    const supabase = supabase.createClient(supabaseUrl, supabaseKey);
    
    let datos = [];
    let catActual = 'Todas';
    let busqueda = '';

    // Cargar datos
    async function cargar() {
        try {
            const { data, error } = await supabase.from('servicios').select('*').order('created_at', { ascending: false });
            if (error) throw error;
            datos = data || [];
            document.getElementById('totalCount').innerHTML = datos.length;
            filtrar();
        } catch(e) {
            console.error(e);
            document.getElementById('cardsContainer').innerHTML = '<div class="empty">Error: ' + e.message + '</div>';
        }
    }

    // Filtrar
    function filtrar() {
        let filtrados = [...datos];
        if (catActual !== 'Todas') filtrados = filtrados.filter(i => i.categoria === catActual);
        if (busqueda) filtrados = filtrados.filter(i => i.nombre && i.nombre.toLowerCase().includes(busqueda.toLowerCase()));
        mostrar(filtrados);
    }

    // Mostrar tarjetas
    function mostrar(items) {
        const container = document.getElementById('cardsContainer');
        if (items.length === 0) {
            container.innerHTML = '<div class="empty">No hay instituciones registradas</div>';
            return;
        }
        container.innerHTML = items.map(i => `
            <div class="card">
                <h3>${i.nombre || '?'}</h3>
                <span class="category">${i.categoria || '?'}</span>
                ${i.direccion ? `<div class="info">📍 ${i.direccion}</div>` : ''}
                ${i.telefono ? `<div class="info">📞 ${i.telefono}</div>` : ''}
                <div class="card-footer">
                    <button class="btn-delete" onclick="eliminar('${i.id}')">🗑️ Eliminar</button>
                </div>
            </div>
        `).join('');
    }

    // Guardar
    async function guardar() {
        const nombre = document.getElementById('nombre').value.trim();
        if (!nombre) { alert('El nombre es obligatorio'); return; }
        const nuevo = {
            nombre: nombre,
            categoria: document.getElementById('categoria').value,
            direccion: document.getElementById('direccion').value,
            telefono: document.getElementById('telefono').value
        };
        try {
            const { error } = await supabase.from('servicios').insert([nuevo]);
            if (error) throw error;
            alert('✅ Agregado');
            cerrarModal();
            cargar();
        } catch(e) { alert('Error: ' + e.message); }
    }

    // Eliminar
    async function eliminar(id) {
        if (!confirm('¿Eliminar esta institución?')) return;
        try {
            const { error } = await supabase.from('servicios').delete().eq('id', id);
            if (error) throw error;
            alert('✅ Eliminado');
            cargar();
        } catch(e) { alert('Error: ' + e.message); }
    }

    // Buscar
    function buscar() {
        busqueda = document.getElementById('searchInput').value;
        filtrar();
    }

    // Filtros
    function configFiltros() {
        document.querySelectorAll('.filter').forEach(f => {
            f.onclick = () => {
                document.querySelectorAll('.filter').forEach(x => x.classList.remove('active'));
                f.classList.add('active');
                catActual = f.dataset.cat;
                filtrar();
            };
        });
    }

    // Modal
    function abrirModal() {
        document.getElementById('modal').style.display = 'flex';
        document.getElementById('nombre').value = '';
        document.getElementById('direccion').value = '';
        document.getElementById('telefono').value = '';
    }
    function cerrarModal() {
        document.getElementById('modal').style.display = 'none';
    }

    document.getElementById('searchInput').addEventListener('keypress', e => { if (e.key === 'Enter') buscar(); });
    
    configFiltros();
    cargar();
</script>
</body>
</html>
