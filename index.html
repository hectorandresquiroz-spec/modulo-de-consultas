<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Directorio LAE - Gestión de Servicios</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .content {
            padding: 30px;
        }

        .form-section {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 30px;
        }

        .form-section h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.5em;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 500;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
        }

        .servicios-list {
            margin-top: 30px;
        }

        .servicios-header {
            display: grid;
            grid-template-columns: 2fr 1fr 2fr 1fr;
            background: #f0f0f0;
            padding: 15px;
            border-radius: 10px;
            font-weight: bold;
            color: #555;
            margin-bottom: 10px;
        }

        .servicio-item {
            display: grid;
            grid-template-columns: 2fr 1fr 2fr 1fr;
            padding: 15px;
            background: white;
            border-bottom: 1px solid #eee;
            align-items: center;
        }

        .servicio-item:hover {
            background: #f8f9fa;
        }

        .delete-btn {
            background: #dc3545;
            padding: 5px 15px;
            font-size: 14px;
            width: auto;
        }

        .delete-btn:hover {
            background: #c82333;
        }

        .empty-message {
            text-align: center;
            padding: 40px;
            color: #999;
            font-size: 1.1em;
        }

        @media (max-width: 768px) {
            .servicios-header, .servicio-item {
                grid-template-columns: 1fr;
                gap: 10px;
            }
            
            .servicios-header {
                display: none;
            }
            
            .servicio-item {
                border: 1px solid #ddd;
                border-radius: 10px;
                margin-bottom: 15px;
                padding: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📋 Directorio LAE</h1>
            <p>Gestión de Servicios y Consultas</p>
        </div>

        <div class="content">
            <!-- Formulario para agregar servicios -->
            <div class="form-section">
                <h2>➕ Agregar Nuevo Servicio</h2>
                <form id="servicioForm">
                    <div class="form-group">
                        <label>Nombre del Servicio:</label>
                        <input type="text" id="nombre" required placeholder="Ej: Consultoría Legal">
                    </div>
                    <div class="form-group">
                        <label>Categoría:</label>
                        <input type="text" id="categoria" required placeholder="Ej: Asesoría">
                    </div>
                    <div class="form-group">
                        <label>Descripción:</label>
                        <textarea id="descripcion" required placeholder="Describe el servicio..."></textarea>
                    </div>
                    <div class="form-group">
                        <label>Contacto:</label>
                        <input type="text" id="contacto" required placeholder="Teléfono o email">
                    </div>
                    <button type="submit">✅ Agregar Servicio</button>
                </form>
            </div>

            <!-- Lista de servicios -->
            <div class="servicios-list">
                <h2>📌 Lista de Servicios</h2>
                <div class="servicios-header">
                    <div>Servicio</div>
                    <div>Categoría</div>
                    <div>Descripción</div>
                    <div>Contacto</div>
                </div>
                <div id="serviciosContainer">
                    <div class="empty-message">Cargando servicios...</div>
                </div>
            </div>
        </div>
    </div>

    <!-- CONEXIÓN A SUPABASE -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Configuración de Supabase
        const supabaseUrl = 'https://qretisqnxujcdcbsfxno.supabase.co';
        const supabaseKey = 'sb_publishable_j_q9B80XokJo-eTgjqHC2Q_y_P01BMH';
        const supabase = supabase.createClient(supabaseUrl, supabaseKey);

        console.log('✅ Conectado a Supabase');

        // Variable para la tabla
        const TABLA = 'servicios';

        // Función para cargar los servicios
        async function cargarServicios() {
            try {
                const { data, error } = await supabase
                    .from(TABLA)
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;

                const container = document.getElementById('serviciosContainer');
                
                if (data.length === 0) {
                    container.innerHTML = '<div class="empty-message">📭 No hay servicios registrados. ¡Agrega el primero!</div>';
                    return;
                }

                container.innerHTML = data.map(servicio => `
                    <div class="servicio-item">
                        <div><strong>${escapeHtml(servicio.nombre)}</strong></div>
                        <div><span style="background: #e0e7ff; padding: 4px 8px; border-radius: 5px;">${escapeHtml(servicio.categoria)}</span></div>
                        <div>${escapeHtml(servicio.descripcion)}</div>
                        <div>
                            ${escapeHtml(servicio.contacto)}
                            <button onclick="eliminarServicio('${servicio.id}')" class="delete-btn">🗑️</button>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Error al cargar servicios:', error);
                document.getElementById('serviciosContainer').innerHTML = '<div class="empty-message">❌ Error al cargar los servicios. Verifica la conexión.</div>';
            }
        }

        // Función para agregar un servicio
        async function agregarServicio(nombre, categoria, descripcion, contacto) {
            try {
                const { data, error } = await supabase
                    .from(TABLA)
                    .insert([
                        { 
                            nombre: nombre,
                            categoria: categoria,
                            descripcion: descripcion,
                            contacto: contacto
                        }
                    ])
                    .select();

                if (error) throw error;
                
                console.log('✅ Servicio agregado:', data);
                return true;
            } catch (error) {
                console.error('Error al agregar servicio:', error);
                alert('Error al agregar: ' + error.message);
                return false;
            }
        }

        // Función para eliminar un servicio
        async function eliminarServicio(id) {
            if (!confirm('¿Estás segura de eliminar este servicio?')) return;
            
            try {
                const { error } = await supabase
                    .from(TABLA)
                    .delete()
                    .eq('id', id);

                if (error) throw error;
                
                console.log('✅ Servicio eliminado');
                cargarServicios(); // Recargar la lista
            } catch (error) {
                console.error('Error al eliminar servicio:', error);
                alert('Error al eliminar: ' + error.message);
            }
        }

        // Función para escapar HTML (evita inyección de código)
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Manejar el formulario
        document.getElementById('servicioForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const nombre = document.getElementById('nombre').value;
            const categoria = document.getElementById('categoria').value;
            const descripcion = document.getElementById('descripcion').value;
            const contacto = document.getElementById('contacto').value;
            
            const exito = await agregarServicio(nombre, categoria, descripcion, contacto);
            
            if (exito) {
                // Limpiar formulario
                document.getElementById('servicioForm').reset();
                // Recargar la lista
                cargarServicios();
                alert('✅ Servicio agregado correctamente');
            }
        });

        // Cargar servicios al iniciar
        cargarServicios();
    </script>
</body>
</html>
